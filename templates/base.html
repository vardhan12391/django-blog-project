<!DOCTYPE html>
<html>

<head>
    <title>My Django Blog</title>

    <!-- bootstrap link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">

            <a class="navbar-brand" href="/">Django Blog</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    {% for c in Category.objects.all %}
                    <li class="nav-item">
                        <a class="nav-link" href="/category/{{ c.id }}/">{{ c.title }}</a>
                    </li>
                    {% endfor %}

                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/search/">Search</a>
                    </li>

                </ul>


                <ul class="navbar-nav">

                    {% if user.is_authenticated %}
                    <li class="nav-item">
                        <a class="nav-link" href="/post/create/">Create Post</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/accounts/profile/">Profile</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/accounts/logout/">Logout ({{ user.username }})</a>
                    </li>

                    {% else %}
                    <li class="nav-item">
                        <a class="nav-link" href="/accounts/login/">Login</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/accounts/signup/">Signup</a>
                    </li>
                    {% endif %}
                </ul>

            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

</body>

</html>
